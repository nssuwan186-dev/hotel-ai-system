<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Hotel AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #1a1a1a; border-right: 1px solid #333; padding: 20px 0; }
    .main-content { margin-left: 280px; padding: 32px; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #888; text-decoration: none; border-radius: 8px; margin: 0 8px; }
    .nav-link:hover, .nav-link.active { background: rgba(102, 126, 234, 0.15); color: #667eea; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: #252525; border-radius: 12px; padding: 24px; }
    .stat-value { font-size: 32px; font-weight: 700; margin: 12px 0; }
    .btn { padding: 10px 20px; background: #252525; border: 1px solid #333; border-radius: 8px; color: #fff; cursor: pointer; }
    .btn-primary { background: #667eea; border-color: #667eea; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div style="padding: 0 20px 20px; border-bottom: 1px solid #333; margin-bottom: 20px;">
      <h2 style="font-size: 18px;">🏨 Hotel AI</h2>
    </div>
    <nav style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/dashboard" class="nav-link"><span>📊</span> Dashboard</a>
      <a href="/chat" class="nav-link"><span>💬</span> Chat</a>
      <a href="/bookings" class="nav-link"><span>📅</span> Bookings</a>
      <a href="/rooms" class="nav-link"><span>🛏️</span> Rooms</a>
      <a href="/customers" class="nav-link"><span>👥</span> Customers</a>
      <a href="/reports" class="nav-link active"><span>📄</span> Reports</a>
      <a href="/settings" class="nav-link"><span>⚙️</span> Settings</a>
    </nav>
  </aside>

  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
      <h1 style="font-size: 24px;">📄 Reports & Analytics</h1>
      <div style="display: flex; gap: 12px;">
        <button class="btn">📊 Export PDF</button>
        <button class="btn btn-primary">📊 Export Excel</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div style="color: #888; font-size: 14px;">Total Revenue</div>
        <div class="stat-value" style="color: #22c55e;">฿0</div>
        <div style="color: #888; font-size: 12px;">This month</div>
      </div>
      <div class="stat-card">
        <div style="color: #888; font-size: 14px;">Occupancy Rate</div>
        <div class="stat-value" style="color: #667eea;">0%</div>
        <div style="color: #888; font-size: 12px;">Average</div>
      </div>
      <div class="stat-card">
        <div style="color: #888; font-size: 14px;">Total Bookings</div>
        <div class="stat-value" style="color: #f59e0b;">0</div>
        <div style="color: #888; font-size: 12px;">This month</div>
      </div>
      <div class="stat-card">
        <div style="color: #888; font-size: 14px;">Total Customers</div>
        <div class="stat-value" style="color: #ef4444;">0</div>
        <div style="color: #888; font-size: 12px;">All time</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 20px;">Generate Report</h3>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px;">
        <div>
          <label style="display: block; color: #888; margin-bottom: 8px; font-size: 14px;">Report Type</label>
          <select style="width: 100%; padding: 10px; background: #252525; border: 1px solid #333; border-radius: 8px; color: #fff;">
            <option>Daily Report</option>
            <option>Weekly Report</option>
            <option>Monthly Report</option>
            <option>Custom Range</option>
          </select>
        </div>
        <div>
          <label style="display: block; color: #888; margin-bottom: 8px; font-size: 14px;">Start Date</label>
          <input type="date" style="width: 100%; padding: 10px; background: #252525; border: 1px solid #333; border-radius: 8px; color: #fff;">
        </div>
        <div>
          <label style="display: block; color: #888; margin-bottom: 8px; font-size: 14px;">End Date</label>
          <input type="date" style="width: 100%; padding: 10px; background: #252525; border: 1px solid #333; border-radius: 8px; color: #fff;">
        </div>
      </div>
      <button class="btn btn-primary">📊 Generate Report</button>
    </div>
  </main>
</body>
</html>
