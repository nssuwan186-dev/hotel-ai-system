<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments - Hotel AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #1a1a1a; border-right: 1px solid #333; padding: 20px 0; }
    .main-content { margin-left: 280px; padding: 32px; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #888; text-decoration: none; border-radius: 8px; margin: 0 8px; }
    .nav-link:hover, .nav-link.active { background: rgba(102, 126, 234, 0.15); color: #667eea; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: #252525; border-radius: 12px; padding: 20px; }
    .stat-value { font-size: 28px; font-weight: 700; margin: 8px 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { color: #888; font-weight: 600; font-size: 14px; }
    .status { padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-completed { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .method-badge { background: #1a1a1a; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div style="padding: 0 20px 20px; border-bottom: 1px solid #333; margin-bottom: 20px;">
      <h2 style="font-size: 18px;">🏨 Hotel AI</h2>
    </div>
    <nav style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/dashboard" class="nav-link"><span>📊</span> Dashboard</a>
      <a href="/chat" class="nav-link"><span>💬</span> Chat</a>
      <a href="/bookings" class="nav-link"><span>📅</span> Bookings</a>
      <a href="/rooms" class="nav-link"><span>🛏️</span> Rooms</a>
      <a href="/customers" class="nav-link"><span>👥</span> Customers</a>
      <a href="/payments" class="nav-link active"><span>💳</span> Payments</a>
      <a href="/reports" class="nav-link"><span>📄</span> Reports</a>
      <a href="/settings" class="nav-link"><span>⚙️</span> Settings</a>
    </nav>
  </aside>

  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
      <h1 style="font-size: 24px;">💳 Payments</h1>
      <button class="btn" style="padding: 10px 20px; background: #667eea; border: none; border-radius: 8px; color: #fff; cursor: pointer;">➕ New Payment</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div style="color: #888; font-size: 13px;">Total Revenue</div>
        <div class="stat-value" style="color: #22c55e;">฿0</div>
      </div>
      <div class="stat-card">
        <div style="color: #888; font-size: 13px;">Pending</div>
        <div class="stat-value" style="color: #f59e0b;">฿0</div>
      </div>
      <div class="stat-card">
        <div style="color: #888; font-size: 13px;">Completed</div>
        <div class="stat-value" style="color: #22c55e;">฿0</div>
      </div>
      <div class="stat-card">
        <div style="color: #888; font-size: 13px;">Transactions</div>
        <div class="stat-value" style="color: #667eea;">0</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 20px;">Recent Payments</h3>
      <table>
        <thead>
          <tr>
            <th>Payment ID</th>
            <th>Booking</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Method</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="payments-table">
          <tr><td colspan="7" style="text-align: center; color: #888;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    async function loadPayments() {
      try {
        const res = await fetch('/api/payments');
        const data = await res.json();
        const tbody = document.getElementById('payments-table');
        
        if (data.success && data.data.length > 0) {
          tbody.innerHTML = data.data.map(p => `
            <tr>
              <td>${p.code}</td>
              <td>${p.booking_id || 'N/A'}</td>
              <td>${p.customer_name || 'N/A'}</td>
              <td style="color: #22c55e; font-weight: 600;">฿${p.amount.toLocaleString()}</td>
              <td><span class="method-badge">${p.method}</span></td>
              <td><span class="status status-${p.status}">${p.status}</span></td>
              <td>${new Date(p.created_at).toLocaleDateString('th-TH')}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #888;">No payments found</td></tr>';
        }
      } catch (error) {
        console.error('Error loading payments:', error);
      }
    }
    loadPayments();
  </script>
</body>
</html>
