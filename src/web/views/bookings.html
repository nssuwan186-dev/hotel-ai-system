<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings - Hotel AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #1a1a1a; border-right: 1px solid #333; padding: 20px 0; }
    .main-content { margin-left: 280px; padding: 32px; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #888; text-decoration: none; border-radius: 8px; margin: 0 8px; }
    .nav-link:hover, .nav-link.active { background: rgba(102, 126, 234, 0.15); color: #667eea; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .btn { padding: 10px 20px; background: #252525; border: 1px solid #333; border-radius: 8px; color: #fff; cursor: pointer; }
    .btn-primary { background: #667eea; border-color: #667eea; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { color: #888; font-weight: 600; }
    .status { padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-confirmed { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div style="padding: 0 20px 20px; border-bottom: 1px solid #333; margin-bottom: 20px;">
      <h2 style="font-size: 18px;">🏨 Hotel AI</h2>
    </div>
    <nav style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/dashboard" class="nav-link"><span>📊</span> Dashboard</a>
      <a href="/chat" class="nav-link"><span>💬</span> Chat</a>
      <a href="/bookings" class="nav-link active"><span>📅</span> Bookings</a>
      <a href="/rooms" class="nav-link"><span>🛏️</span> Rooms</a>
      <a href="/customers" class="nav-link"><span>👥</span> Customers</a>
      <a href="/reports" class="nav-link"><span>📄</span> Reports</a>
      <a href="/settings" class="nav-link"><span>⚙️</span> Settings</a>
    </nav>
  </aside>

  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
      <h1 style="font-size: 24px;">📅 Bookings Management</h1>
      <button class="btn btn-primary">➕ New Booking</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 20px;">All Bookings</h3>
      <table>
        <thead>
          <tr>
            <th>Booking ID</th>
            <th>Customer</th>
            <th>Room</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Status</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody id="bookings-table">
          <tr><td colspan="7" style="text-align: center; color: #888;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    async function loadBookings() {
      try {
        const res = await fetch('/api/bookings');
        const data = await res.json();
        const tbody = document.getElementById('bookings-table');
        
        if (data.success && data.data.length > 0) {
          tbody.innerHTML = data.data.map(b => `
            <tr>
              <td>${b.code}</td>
              <td>${b.customer_name || 'N/A'}</td>
              <td>Room ${b.room_id}</td>
              <td>${new Date(b.check_in).toLocaleDateString('th-TH')}</td>
              <td>${new Date(b.check_out).toLocaleDateString('th-TH')}</td>
              <td><span class="status status-${b.status}">${b.status}</span></td>
              <td>฿${b.total_price.toLocaleString()}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #888;">No bookings found</td></tr>';
        }
      } catch (error) {
        console.error('Error loading bookings:', error);
        document.getElementById('bookings-table').innerHTML = '<tr><td colspan="7" style="text-align: center; color: #ef4444;">Error loading data</td></tr>';
      }
    }
    loadBookings();
  </script>
</body>
</html>
