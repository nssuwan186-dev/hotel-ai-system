<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - Hotel AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #1a1a1a; border-right: 1px solid #333; padding: 20px 0; }
    .main-content { margin-left: 280px; padding: 32px; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #888; text-decoration: none; border-radius: 8px; margin: 0 8px; }
    .nav-link:hover, .nav-link.active { background: rgba(102, 126, 234, 0.15); color: #667eea; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .room-card { background: #252525; border-radius: 12px; padding: 24px; border: 2px solid transparent; transition: all 0.3s; }
    .room-card:hover { border-color: #667eea; transform: translateY(-4px); }
    .room-number { font-size: 32px; font-weight: 700; margin-bottom: 8px; color: #667eea; }
    .room-type { font-size: 14px; color: #888; margin-bottom: 16px; }
    .room-info { display: flex; justify-content: space-between; margin: 12px 0; font-size: 14px; }
    .room-price { font-size: 20px; font-weight: 700; color: #22c55e; margin-top: 16px; }
    .status-badge { display: inline-block; padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-top: 12px; }
    .status-available { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-occupied { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .status-maintenance { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .amenities { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .amenity { background: #1a1a1a; padding: 4px 10px; border-radius: 6px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div style="padding: 0 20px 20px; border-bottom: 1px solid #333; margin-bottom: 20px;">
      <h2 style="font-size: 18px;">🏨 Hotel AI</h2>
    </div>
    <nav style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/dashboard" class="nav-link"><span>📊</span> Dashboard</a>
      <a href="/chat" class="nav-link"><span>💬</span> Chat</a>
      <a href="/bookings" class="nav-link"><span>📅</span> Bookings</a>
      <a href="/rooms" class="nav-link active"><span>🛏️</span> Rooms</a>
      <a href="/customers" class="nav-link"><span>👥</span> Customers</a>
      <a href="/reports" class="nav-link"><span>📄</span> Reports</a>
      <a href="/settings" class="nav-link"><span>⚙️</span> Settings</a>
    </nav>
  </aside>

  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
      <h1 style="font-size: 24px;">🛏️ Rooms Management</h1>
      <button class="btn" style="padding: 10px 20px; background: #667eea; border: none; border-radius: 8px; color: #fff; cursor: pointer;">➕ Add Room</button>
    </div>

    <div class="card">
      <div style="display: flex; gap: 12px; margin-bottom: 20px;">
        <button class="btn" style="background: #252525; border: 1px solid #333;">All Rooms</button>
        <button class="btn" style="background: transparent; border: 1px solid #333;">Available</button>
        <button class="btn" style="background: transparent; border: 1px solid #333;">Occupied</button>
      </div>
      <div class="grid" id="rooms-grid">
        <div style="color: #888; text-align: center;">Loading...</div>
      </div>
    </div>
  </main>

  <script>
    async function loadRooms() {
      try {
        const res = await fetch('/api/rooms');
        const data = await res.json();
        const grid = document.getElementById('rooms-grid');
        
        if (data.success && data.data.length > 0) {
          grid.innerHTML = data.data.map(r => `
            <div class="room-card">
              <div class="room-number">Room ${r.roomNumber}</div>
              <div class="room-type">${r.type.toUpperCase()}</div>
              <div class="room-info"><span>👥 ${r.capacity} guests</span></div>
              <div class="room-info"><span>🏢 Floor ${r.floor}</span></div>
              <div class="room-price">฿${r.pricePerNight.toLocaleString()} / night</div>
              <span class="status-badge status-${r.status}">${r.status}</span>
              <div class="amenities">
                ${r.amenities.map(a => `<span class="amenity">${a}</span>`).join('')}
              </div>
            </div>
          `).join('');
        } else {
          grid.innerHTML = '<div style="color: #888; text-align: center;">No rooms found</div>';
        }
      } catch (error) {
        console.error('Error loading rooms:', error);
      }
    }
    loadRooms();
  </script>
</body>
</html>
